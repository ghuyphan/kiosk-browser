<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Kiosk Remote Controller</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, sans-serif;
            background: #101124;
            color: #f8fafc;
        }
        * { box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #101124; }
        button, input, textarea {
            border: 1px solid #3a3d65;
            background: #181a31;
            color: #fff;
            font: inherit;
        }
        button { cursor: pointer; }
        button:active { background: #2a2d50; }
        button:disabled { opacity: .35; }
        .app {
            width: min(100%, 560px);
            height: 100dvh;
            margin: auto;
            padding: max(10px, env(safe-area-inset-top)) 12px max(8px, env(safe-area-inset-bottom));
            display: grid;
            grid-template-rows: 62px minmax(0, 1fr) 58px;
            gap: 6px;
        }
        .top { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .grow { flex: 1; min-width: 0; }
        h1 { margin: 0 0 2px; font-size: 19px; font-weight: 600; }
        #connectionStatus { color: #9297b8; font-size: 13px; }
        #connectionStatus.connected { color: #34d399; }
        #connectionStatus.error { color: #fb7185; }
        #pageTitle, #pageUrl, #feedback {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
        }
        .icon {
            width: 46px;
            height: 46px;
            padding: 0;
            border: 0;
            border-radius: 13px;
            background: transparent;
            font-size: 23px;
        }
        .menu { position: relative; }
        .menu-popover {
            position: absolute;
            z-index: 5;
            top: 50px;
            right: 0;
            width: 210px;
            padding: 8px;
            border: 1px solid #3a3d65;
            border-radius: 14px;
            background: #1d1f39;
            box-shadow: 0 14px 40px #0008;
        }
        .menu-popover[hidden] { display: none; }
        .menu-popover button {
            width: 100%;
            min-height: 44px;
            border: 0;
            border-radius: 9px;
            background: transparent;
            text-align: left;
            padding: 0 12px;
        }
        .url-row { display: flex; gap: 8px; padding: 8px 4px 2px; }
        .url-row input {
            min-width: 0;
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border-radius: 10px;
            outline: none;
        }
        .url-row button { min-width: 48px; border-radius: 10px; }
        .mode-content { min-height: 0; }
        .panel { height: 100%; min-height: 0; }
        .panel[hidden] { display: none; }
        #mousePanel {
            display: grid;
            grid-template-rows: minmax(0, 1fr) 52px;
            gap: 8px;
        }
        .touchpad {
            position: relative;
            min-height: 0;
            border: 1px solid #3b3f70;
            border-radius: 20px;
            background: #181a31;
            touch-action: none;
        }
        .touchpad.active { border-color: #7c3aed; }
        .mouse-mark {
            position: absolute;
            inset: 50% auto auto 50%;
            translate: -50% -50%;
            color: #5b638f;
            font-size: 42px;
        }
        .scroll-rail {
            position: absolute;
            right: 14px;
            top: 50%;
            translate: 0 -50%;
            color: #5b638f;
            line-height: 2;
            text-align: center;
        }
        .mouse-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mouse-buttons button {
            border-radius: 14px;
            color: #9297b8;
            font-size: 25px;
        }
        #keyboardPanel {
            grid-template-rows: minmax(0, 1fr) 52px 48px;
            gap: 8px;
        }
        #keyboardPanel:not([hidden]) { display: grid; }
        textarea {
            width: 100%;
            min-height: 0;
            padding: 16px;
            border-radius: 16px;
            resize: none;
            outline: none;
            font-size: 16px;
        }
        textarea:focus, input:focus { border-color: #7c3aed; }
        .send { border-radius: 14px; border-color: #7c3aed; background: #6d28d9; font-weight: 600; }
        .key-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
        .key-row button { border-radius: 12px; }
        .mode-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            align-items: center;
        }
        .mode-bar button {
            height: 48px;
            border: 1px solid transparent;
            border-radius: 14px;
            background: transparent;
            color: #848bb1;
            font-size: 23px;
        }
        #openWebsiteMode { font-size: 29px; }
        .mode-bar button.selected {
            border-color: #7c3aed;
            background: #281f4e;
            color: #c4b5fd;
        }
    </style>
</head>
<body>
<main class="app">
    <header class="top">
        <div class="grow">
            <h1>Mouse / Keyboard</h1>
            <div id="connectionStatus">Connecting</div>
        </div>
        <div class="menu">
            <button id="menuButton" class="icon" aria-label="More controls">⋮</button>
            <div id="controlMenu" class="menu-popover" hidden>
                <button data-command="back" id="backButton">←&nbsp;&nbsp; Back</button>
                <button data-command="forward" id="forwardButton">→&nbsp;&nbsp; Forward</button>
                <button data-command="reload">↻&nbsp;&nbsp; Reload</button>
                <button data-command="home">⌂&nbsp;&nbsp; Home</button>
                <div class="url-row">
                    <input id="urlInput" type="url" inputmode="url" placeholder="example.com">
                    <button id="goButton" aria-label="Open website">Go</button>
                </div>
            </div>
        </div>
        <div id="pageTitle">Waiting for kiosk...</div>
        <div id="pageUrl"></div>
        <div id="feedback">Opening secure session</div>
    </header>

    <div class="mode-content">
        <section id="mousePanel" class="panel">
            <div id="touchpad" class="touchpad" aria-label="Remote trackpad">
                <span class="mouse-mark" aria-hidden="true">⌁</span>
                <span class="scroll-rail" aria-hidden="true">⌃<br>│<br>│<br>⌄</span>
            </div>
            <div class="mouse-buttons">
                <button id="leftClickButton" aria-label="Left click"></button>
                <button id="rightClickButton" aria-label="Right click"></button>
            </div>
        </section>

        <section id="keyboardPanel" class="panel" hidden>
            <textarea id="keyboardInput" placeholder="Type on the kiosk"></textarea>
            <button id="sendTextButton" class="send">Send text</button>
            <div class="key-row">
                <button data-key="backspace">⌫</button>
                <button data-key="tab">Tab</button>
                <button data-key="escape">Esc</button>
                <button data-key="enter">Enter</button>
            </div>
        </section>
    </div>

    <nav class="mode-bar" aria-label="Controller modes">
        <button id="touchpadMode" class="selected" aria-label="Mouse mode">⌁</button>
        <button id="keyboardMode" aria-label="Keyboard mode">⌨</button>
        <button id="openWebsiteMode" aria-label="Open website">◎</button>
    </nav>
    <input id="sensitivity" type="hidden" value="1.25">
</main>

<script>
    const params = new URLSearchParams(location.hash.slice(1));
    const topic = params.get("topic");
    const secret = params.get("secret");
    const statusTopic = topic ? `${topic}-status` : "";
    const pending = new Map();
    const encoder = new TextEncoder();
    let signingKey;
    let connected = false;
    let lastStatusAt = 0;
    let controlMode = "touchpad";
    let rateLimitedUntil = 0;

    const statusElement = document.getElementById("connectionStatus");
    const feedbackElement = document.getElementById("feedback");
    const touchpad = document.getElementById("touchpad");
    const controls = [...document.querySelectorAll("button")];

    function setConnection(state, text) {
        connected = state === "connected";
        statusElement.textContent = text;
        statusElement.className = `status ${state === "connected" ? "connected" : state === "error" ? "error" : ""}`;
        controls.forEach(button => button.disabled = !connected);
    }

    function feedback(text, kind = "") {
        feedbackElement.textContent = text;
        feedbackElement.className = `feedback ${kind}`;
    }

    function randomId() {
        return crypto.randomUUID
            ? crypto.randomUUID()
            : [...crypto.getRandomValues(new Uint8Array(16))]
                .map(value => value.toString(16).padStart(2, "0")).join("");
    }

    async function getSigningKey() {
        if (!signingKey) {
            signingKey = await crypto.subtle.importKey(
                "raw",
                encoder.encode(secret),
                { name: "HMAC", hash: "SHA-256" },
                false,
                ["sign", "verify"]
            );
        }
        return signingKey;
    }

    async function signatureFor(id, timestamp, action, value) {
        const signature = await crypto.subtle.sign(
            "HMAC",
            await getSigningKey(),
            encoder.encode(`${id}\n${timestamp}\n${action}\n${value}`)
        );
        return [...new Uint8Array(signature)]
            .map(byte => byte.toString(16).padStart(2, "0")).join("");
    }

    async function verifyEvent(event) {
        if (!event.id || !event.timestamp || !event.action || !event.signature) return false;
        if (Math.abs(Date.now() - event.timestamp) > 120000) return false;
        const expected = await signatureFor(event.id, event.timestamp, event.action, event.value || "");
        return expected === event.signature;
    }

    async function sendCommand(action, value = "", options = {}) {
        if (!topic || !secret) throw new Error("Invalid controller link");
        if (Date.now() < rateLimitedUntil) {
            throw new Error("Remote service is cooling down");
        }
        const id = randomId();
        const timestamp = Date.now();
        const payload = {
            version: 2,
            id,
            timestamp,
            action,
            value,
            signature: await signatureFor(id, timestamp, action, value)
        };
        if (!options.quiet) feedback(`Sending ${action.replace("_", " ")}...`);
        const response = await fetch(`https://ntfy.sh/${encodeURIComponent(topic)}`, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: JSON.stringify(payload)
        });
        if (response.status === 429) {
            rateLimitedUntil = Date.now() + 15000;
            if (!options.quiet) feedback("Too many commands. Pausing briefly.", "error");
            throw new Error("Remote service is cooling down");
        }
        if (!response.ok) throw new Error(`Send failed (${response.status})`);
        if (options.noAck) return id;
        return new Promise((resolve, reject) => {
            const timeout = setTimeout(() => {
                pending.delete(id);
                reject(new Error("Kiosk did not acknowledge the command"));
            }, 7000);
            pending.set(id, { resolve, reject, timeout, quiet: options.quiet });
        });
    }

    async function handleStatusMessage(wrapper) {
        if (wrapper.event !== "message") return;
        let event;
        try {
            event = JSON.parse(wrapper.message);
        } catch {
            return;
        }
        if (!(await verifyEvent(event))) return;
        lastStatusAt = Date.now();
        if (event.action === "ack") {
            const ack = JSON.parse(event.value);
            const request = pending.get(ack.commandId);
            if (!request) return;
            clearTimeout(request.timeout);
            pending.delete(ack.commandId);
            if (ack.success) {
                if (!request.quiet) feedback(ack.message || "Command received", "ok");
                request.resolve(ack);
            } else {
                if (!request.quiet) feedback(ack.message || "Command rejected", "error");
                request.reject(new Error(ack.message || "Command rejected"));
            }
        } else if (event.action === "status") {
            const page = JSON.parse(event.value);
            setConnection("connected", page.loading ? "Loading" : "Connected");
            document.getElementById("pageTitle").textContent = page.title || "Untitled page";
            document.getElementById("pageUrl").textContent = page.url || "";
            document.getElementById("backButton").disabled = !page.canGoBack;
            document.getElementById("forwardButton").disabled = !page.canGoForward;
        }
    }

    function openStatusStream() {
        const stream = new EventSource(`https://ntfy.sh/${encodeURIComponent(statusTopic)}/sse`);
        stream.onmessage = async message => {
            try {
                await handleStatusMessage(JSON.parse(message.data));
            } catch (error) {
                console.warn("Invalid status event", error);
            }
        };
        stream.onopen = async () => {
            setConnection("connecting", "Pairing");
            try {
                await sendCommand("hello", JSON.stringify({ name: navigator.platform || "Web controller" }));
                setConnection("connected", "Connected");
                feedback("Remote controller connected", "ok");
            } catch (error) {
                setConnection("error", "No response");
                feedback(error.message, "error");
            }
        };
        stream.onerror = () => {
            if (Date.now() - lastStatusAt > 30000) {
                setConnection("error", "Reconnecting");
            }
        };
    }

    async function run(action, value = "", options = {}) {
        try {
            return await sendCommand(action, value, options);
        } catch (error) {
            if (!options.quiet) feedback(error.message, "error");
            throw error;
        }
    }

    document.querySelectorAll("[data-command]").forEach(button => {
        button.addEventListener("click", () => run(button.dataset.command));
    });
    document.querySelectorAll("[data-key]").forEach(button => {
        button.addEventListener("click", () => run("key", button.dataset.key));
    });
    document.querySelectorAll("[data-scroll]").forEach(button => {
        button.addEventListener("click", () => run("scroll", JSON.stringify({
            dx: 0,
            dy: Number(button.dataset.scroll)
        })));
    });

    document.getElementById("goButton").addEventListener("click", () => {
        let url = document.getElementById("urlInput").value.trim();
        if (!url) return;
        if (!/^https:\/\//i.test(url)) url = `https://${url.replace(/^[a-z]+:\/\//i, "")}`;
        run("url", url);
    });
    document.getElementById("sendTextButton").addEventListener("click", async () => {
        const input = document.getElementById("keyboardInput");
        if (!input.value) return;
        await run("type", input.value);
        input.value = "";
    });

    let pointers = new Map();
    let lastTapAt = 0;
    let pressStartedAt = 0;
    let totalMovement = 0;
    let accumulatedX = 0;
    let accumulatedY = 0;
    let movementTimer = 0;

    function queueMovement(dx, dy, scrolling) {
        accumulatedX += dx;
        accumulatedY += dy;
        if (movementTimer) return;
        movementTimer = setTimeout(() => {
            const payload = scrolling
                ? { dx: Math.round(-accumulatedX * 2), dy: Math.round(-accumulatedY * 2) }
                : {
                    dx: accumulatedX,
                    dy: accumulatedY,
                    sensitivity: Number(document.getElementById("sensitivity").value)
                };
            accumulatedX = 0;
            accumulatedY = 0;
            movementTimer = 0;
            run(
                scrolling ? "scroll" : "pointer_move",
                JSON.stringify(payload),
                { quiet: true, noAck: true }
            ).catch(() => {});
        }, 500);
    }

    const controlMenu = document.getElementById("controlMenu");
    const mousePanel = document.getElementById("mousePanel");
    const keyboardPanel = document.getElementById("keyboardPanel");
    const touchpadModeButton = document.getElementById("touchpadMode");
    const keyboardModeButton = document.getElementById("keyboardMode");

    function showMouseMode() {
        controlMode = "touchpad";
        mousePanel.hidden = false;
        keyboardPanel.hidden = true;
        touchpadModeButton.classList.add("selected");
        keyboardModeButton.classList.remove("selected");
    }

    function showKeyboardMode() {
        mousePanel.hidden = true;
        keyboardPanel.hidden = false;
        touchpadModeButton.classList.remove("selected");
        keyboardModeButton.classList.add("selected");
        document.getElementById("keyboardInput").focus();
    }

    touchpadModeButton.addEventListener("click", showMouseMode);
    keyboardModeButton.addEventListener("click", showKeyboardMode);
    document.getElementById("menuButton").addEventListener("click", () => {
        controlMenu.hidden = !controlMenu.hidden;
    });
    document.getElementById("openWebsiteMode").addEventListener("click", () => {
        controlMenu.hidden = false;
        document.getElementById("urlInput").focus();
    });
    document.getElementById("leftClickButton").addEventListener("click", () => run("tap"));
    document.getElementById("rightClickButton").addEventListener("click", () => run("long_press"));

    touchpad.addEventListener("pointerdown", event => {
        touchpad.setPointerCapture(event.pointerId);
        pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        pressStartedAt = Date.now();
        totalMovement = 0;
        touchpad.classList.add("active");
    });
    touchpad.addEventListener("pointermove", event => {
        const previous = pointers.get(event.pointerId);
        if (!previous) return;
        const dx = event.clientX - previous.x;
        const dy = event.clientY - previous.y;
        pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        totalMovement += Math.abs(dx) + Math.abs(dy);
        if (pointers.size >= 2) {
            queueMovement(dx, dy, true);
        } else if (controlMode === "touchpad") {
            queueMovement(dx, dy, false);
        }
    });
    function finishPointer(event) {
        const wasPrimary = pointers.size === 1;
        pointers.delete(event.pointerId);
        if (!pointers.size) touchpad.classList.remove("active");
        if (!wasPrimary || totalMovement > 12) return;
        if (controlMode === "direct") {
            const bounds = touchpad.getBoundingClientRect();
            run("tap_at", JSON.stringify({
                x: (event.clientX - bounds.left) / bounds.width,
                y: (event.clientY - bounds.top) / bounds.height
            }));
            return;
        }
        const duration = Date.now() - pressStartedAt;
        if (duration > 550) {
            run("long_press");
            return;
        }
        const now = Date.now();
        if (now - lastTapAt < 320) {
            lastTapAt = 0;
            run("double_tap");
        } else {
            lastTapAt = now;
            setTimeout(() => {
                if (lastTapAt === now) {
                    lastTapAt = 0;
                    run("tap");
                }
            }, 330);
        }
    }
    touchpad.addEventListener("pointerup", finishPointer);
    touchpad.addEventListener("pointercancel", event => {
        pointers.delete(event.pointerId);
        if (!pointers.size) touchpad.classList.remove("active");
    });

    setConnection("connecting", "Connecting");
    if (!topic || !secret || !crypto.subtle) {
        setConnection("error", "Invalid link");
        feedback("Open this controller from the kiosk QR code using HTTPS.", "error");
    } else {
        openStatusStream();
        setInterval(() => {
            if (connected) run("page_status", "", { quiet: true }).catch(() => {});
            if (lastStatusAt && Date.now() - lastStatusAt > 45000) {
                setConnection("error", "Reconnecting");
            }
        }, 20000);
    }
</script>
</body>
</html>
