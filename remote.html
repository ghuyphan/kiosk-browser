<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Kiosk Remote Controller</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, sans-serif;
            background: #101124;
            color: #f8fafc;
        }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 16px; background: #101124; }
        .app { width: min(100%, 560px); margin: auto; display: grid; gap: 14px; }
        .card {
            background: #15172c;
            border: 1px solid #2d3056;
            border-radius: 18px;
            padding: 16px;
        }
        .top { display: flex; align-items: center; gap: 12px; }
        .grow { flex: 1; min-width: 0; }
        h1 { margin: 0 0 4px; font-size: 18px; }
        .muted { color: #9297b8; font-size: 12px; }
        #pageTitle, #pageUrl {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #pageTitle { margin-top: 12px; font-weight: 600; }
        #pageUrl { margin-top: 3px; color: #9297b8; font-size: 12px; }
        .status {
            padding: 7px 10px;
            border-radius: 999px;
            background: #2d3056;
            font-size: 12px;
            white-space: nowrap;
        }
        .status.connected { color: #34d399; background: #12362f; }
        .status.error { color: #fb7185; background: #451c2a; }
        .section-title {
            margin-bottom: 10px;
            color: #9297b8;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        .touchpad {
            height: 250px;
            border: 1px solid #3b3f70;
            border-radius: 16px;
            background:
                radial-gradient(circle at center, #25284b 0 2px, transparent 3px),
                linear-gradient(145deg, #1e203b, #111225);
            touch-action: none;
            display: grid;
            place-items: center;
            color: #70769f;
            text-align: center;
            padding: 30px;
        }
        .touchpad.active { border-color: #7c3aed; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid.four { grid-template-columns: repeat(4, 1fr); }
        .row { display: flex; gap: 8px; }
        button, input, textarea, select {
            border: 1px solid #343862;
            border-radius: 12px;
            background: #1f223f;
            color: #fff;
            font: inherit;
        }
        button {
            min-height: 44px;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        button:active { transform: scale(.97); background: #30345c; }
        button:disabled { opacity: .38; cursor: default; }
        button.primary { border-color: #7c3aed; background: #7c3aed; }
        input, textarea { width: 100%; padding: 12px; outline: none; }
        textarea { min-height: 74px; resize: vertical; }
        input:focus, textarea:focus { border-color: #7c3aed; }
        .row input, .row textarea { flex: 1; min-width: 0; }
        .row button { flex: 0 0 auto; }
        .feedback { min-height: 17px; margin-top: 9px; color: #9297b8; font-size: 12px; }
        .feedback.ok { color: #34d399; }
        .feedback.error { color: #fb7185; }
        .hint { margin-top: 9px; color: #70769f; font-size: 11px; text-align: center; }
    </style>
</head>
<body>
<main class="app">
    <section class="card">
        <div class="top">
            <div class="grow">
                <h1>Kiosk Remote</h1>
                <div class="muted">Practical website control</div>
            </div>
            <div id="connectionStatus" class="status">Connecting</div>
        </div>
        <div id="pageTitle">Waiting for kiosk...</div>
        <div id="pageUrl"></div>
        <div id="feedback" class="feedback">Opening secure session</div>
    </section>

    <section class="card">
        <div class="section-title">Touchpad</div>
        <div class="row" style="margin-bottom:8px">
            <button id="touchpadMode" class="primary" style="flex:1">Touchpad</button>
            <button id="directMode" style="flex:1">Direct touch</button>
            <select id="sensitivity" aria-label="Pointer sensitivity">
                <option value=".8">Slow</option>
                <option value="1.25" selected>Normal</option>
                <option value="1.8">Fast</option>
            </select>
        </div>
        <div id="touchpad" class="touchpad">
            Move one finger to control the cursor<br>
            Tap to click, double tap to double-click
        </div>
        <div class="hint">Two-finger movement scrolls. Hold for a long press.</div>
    </section>

    <section class="card">
        <div class="section-title">Navigation</div>
        <div class="grid four">
            <button data-command="back" id="backButton">Back</button>
            <button data-command="forward" id="forwardButton">Forward</button>
            <button data-command="reload">Reload</button>
            <button data-command="home">Home</button>
        </div>
        <div class="row" style="margin-top:8px">
            <input id="urlInput" type="url" inputmode="url" placeholder="https://example.com">
            <button id="goButton" class="primary">Go</button>
        </div>
    </section>

    <section class="card">
        <div class="section-title">Keyboard</div>
        <div class="row">
            <textarea id="keyboardInput" placeholder="Text is inserted at the active cursor"></textarea>
            <button id="sendTextButton" class="primary">Send</button>
        </div>
        <div class="grid four" style="margin-top:8px">
            <button data-key="backspace">⌫</button>
            <button data-key="tab">Tab</button>
            <button data-key="enter">Enter</button>
            <button data-key="escape">Esc</button>
            <button data-key="arrowleft">←</button>
            <button data-key="arrowup">↑</button>
            <button data-key="arrowdown">↓</button>
            <button data-key="arrowright">→</button>
        </div>
    </section>

    <section class="card">
        <div class="section-title">Scroll</div>
        <div class="grid four">
            <button data-scroll="-700">Page up</button>
            <button data-scroll="-220">Up</button>
            <button data-scroll="220">Down</button>
            <button data-scroll="700">Page down</button>
        </div>
    </section>
</main>

<script>
    const params = new URLSearchParams(location.hash.slice(1));
    const topic = params.get("topic");
    const secret = params.get("secret");
    const statusTopic = topic ? `${topic}-status` : "";
    const pending = new Map();
    const encoder = new TextEncoder();
    let signingKey;
    let connected = false;
    let lastStatusAt = 0;
    let controlMode = "touchpad";

    const statusElement = document.getElementById("connectionStatus");
    const feedbackElement = document.getElementById("feedback");
    const touchpad = document.getElementById("touchpad");
    const controls = [...document.querySelectorAll("button")];

    function setConnection(state, text) {
        connected = state === "connected";
        statusElement.textContent = text;
        statusElement.className = `status ${state === "connected" ? "connected" : state === "error" ? "error" : ""}`;
        controls.forEach(button => button.disabled = !connected);
    }

    function feedback(text, kind = "") {
        feedbackElement.textContent = text;
        feedbackElement.className = `feedback ${kind}`;
    }

    function randomId() {
        return crypto.randomUUID
            ? crypto.randomUUID()
            : [...crypto.getRandomValues(new Uint8Array(16))]
                .map(value => value.toString(16).padStart(2, "0")).join("");
    }

    async function getSigningKey() {
        if (!signingKey) {
            signingKey = await crypto.subtle.importKey(
                "raw",
                encoder.encode(secret),
                { name: "HMAC", hash: "SHA-256" },
                false,
                ["sign", "verify"]
            );
        }
        return signingKey;
    }

    async function signatureFor(id, timestamp, action, value) {
        const signature = await crypto.subtle.sign(
            "HMAC",
            await getSigningKey(),
            encoder.encode(`${id}\n${timestamp}\n${action}\n${value}`)
        );
        return [...new Uint8Array(signature)]
            .map(byte => byte.toString(16).padStart(2, "0")).join("");
    }

    async function verifyEvent(event) {
        if (!event.id || !event.timestamp || !event.action || !event.signature) return false;
        if (Math.abs(Date.now() - event.timestamp) > 120000) return false;
        const expected = await signatureFor(event.id, event.timestamp, event.action, event.value || "");
        return expected === event.signature;
    }

    async function sendCommand(action, value = "", options = {}) {
        if (!topic || !secret) throw new Error("Invalid controller link");
        const id = randomId();
        const timestamp = Date.now();
        const payload = {
            version: 2,
            id,
            timestamp,
            action,
            value,
            signature: await signatureFor(id, timestamp, action, value)
        };
        if (!options.quiet) feedback(`Sending ${action.replace("_", " ")}...`);
        const response = await fetch(`https://ntfy.sh/${encodeURIComponent(topic)}`, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error(`Send failed (${response.status})`);
        if (options.noAck) return id;
        return new Promise((resolve, reject) => {
            const timeout = setTimeout(() => {
                pending.delete(id);
                reject(new Error("Kiosk did not acknowledge the command"));
            }, 7000);
            pending.set(id, { resolve, reject, timeout, quiet: options.quiet });
        });
    }

    async function handleStatusMessage(wrapper) {
        if (wrapper.event !== "message") return;
        let event;
        try {
            event = JSON.parse(wrapper.message);
        } catch {
            return;
        }
        if (!(await verifyEvent(event))) return;
        lastStatusAt = Date.now();
        if (event.action === "ack") {
            const ack = JSON.parse(event.value);
            const request = pending.get(ack.commandId);
            if (!request) return;
            clearTimeout(request.timeout);
            pending.delete(ack.commandId);
            if (ack.success) {
                if (!request.quiet) feedback(ack.message || "Command received", "ok");
                request.resolve(ack);
            } else {
                if (!request.quiet) feedback(ack.message || "Command rejected", "error");
                request.reject(new Error(ack.message || "Command rejected"));
            }
        } else if (event.action === "status") {
            const page = JSON.parse(event.value);
            setConnection("connected", page.loading ? "Loading" : "Connected");
            document.getElementById("pageTitle").textContent = page.title || "Untitled page";
            document.getElementById("pageUrl").textContent = page.url || "";
            document.getElementById("backButton").disabled = !page.canGoBack;
            document.getElementById("forwardButton").disabled = !page.canGoForward;
        }
    }

    function openStatusStream() {
        const stream = new EventSource(`https://ntfy.sh/${encodeURIComponent(statusTopic)}/sse`);
        stream.onmessage = async message => {
            try {
                await handleStatusMessage(JSON.parse(message.data));
            } catch (error) {
                console.warn("Invalid status event", error);
            }
        };
        stream.onopen = async () => {
            setConnection("connecting", "Pairing");
            try {
                await sendCommand("hello", JSON.stringify({ name: navigator.platform || "Web controller" }));
                setConnection("connected", "Connected");
                feedback("Remote controller connected", "ok");
            } catch (error) {
                setConnection("error", "No response");
                feedback(error.message, "error");
            }
        };
        stream.onerror = () => {
            if (Date.now() - lastStatusAt > 30000) {
                setConnection("error", "Reconnecting");
            }
        };
    }

    async function run(action, value = "", options = {}) {
        try {
            return await sendCommand(action, value, options);
        } catch (error) {
            if (!options.quiet) feedback(error.message, "error");
            throw error;
        }
    }

    document.querySelectorAll("[data-command]").forEach(button => {
        button.addEventListener("click", () => run(button.dataset.command));
    });
    document.querySelectorAll("[data-key]").forEach(button => {
        button.addEventListener("click", () => run("key", button.dataset.key));
    });
    document.querySelectorAll("[data-scroll]").forEach(button => {
        button.addEventListener("click", () => run("scroll", JSON.stringify({
            dx: 0,
            dy: Number(button.dataset.scroll)
        })));
    });

    document.getElementById("goButton").addEventListener("click", () => {
        let url = document.getElementById("urlInput").value.trim();
        if (!url) return;
        if (!/^https:\/\//i.test(url)) url = `https://${url.replace(/^[a-z]+:\/\//i, "")}`;
        run("url", url);
    });
    document.getElementById("sendTextButton").addEventListener("click", async () => {
        const input = document.getElementById("keyboardInput");
        if (!input.value) return;
        await run("type", input.value);
        input.value = "";
    });

    let pointers = new Map();
    let lastTapAt = 0;
    let pressStartedAt = 0;
    let totalMovement = 0;
    let accumulatedX = 0;
    let accumulatedY = 0;
    let movementTimer = 0;

    function queueMovement(dx, dy, scrolling) {
        accumulatedX += dx;
        accumulatedY += dy;
        if (movementTimer) return;
        movementTimer = setTimeout(() => {
            const payload = scrolling
                ? { dx: Math.round(-accumulatedX * 2), dy: Math.round(-accumulatedY * 2) }
                : {
                    dx: accumulatedX,
                    dy: accumulatedY,
                    sensitivity: Number(document.getElementById("sensitivity").value)
                };
            accumulatedX = 0;
            accumulatedY = 0;
            movementTimer = 0;
            run(
                scrolling ? "scroll" : "pointer_move",
                JSON.stringify(payload),
                { quiet: true, noAck: true }
            ).catch(() => {});
        }, 80);
    }

    document.getElementById("touchpadMode").addEventListener("click", () => {
        controlMode = "touchpad";
        document.getElementById("touchpadMode").classList.add("primary");
        document.getElementById("directMode").classList.remove("primary");
        touchpad.innerHTML = "Move one finger to control the cursor<br>Tap to click, double tap to double-click";
    });
    document.getElementById("directMode").addEventListener("click", () => {
        controlMode = "direct";
        document.getElementById("directMode").classList.add("primary");
        document.getElementById("touchpadMode").classList.remove("primary");
        touchpad.innerHTML = "This surface maps to the kiosk page<br>Tap the matching location";
    });

    touchpad.addEventListener("pointerdown", event => {
        touchpad.setPointerCapture(event.pointerId);
        pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        pressStartedAt = Date.now();
        totalMovement = 0;
        touchpad.classList.add("active");
    });
    touchpad.addEventListener("pointermove", event => {
        const previous = pointers.get(event.pointerId);
        if (!previous) return;
        const dx = event.clientX - previous.x;
        const dy = event.clientY - previous.y;
        pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        totalMovement += Math.abs(dx) + Math.abs(dy);
        if (pointers.size >= 2) {
            queueMovement(dx, dy, true);
        } else if (controlMode === "touchpad") {
            queueMovement(dx, dy, false);
        }
    });
    function finishPointer(event) {
        const wasPrimary = pointers.size === 1;
        pointers.delete(event.pointerId);
        if (!pointers.size) touchpad.classList.remove("active");
        if (!wasPrimary || totalMovement > 12) return;
        if (controlMode === "direct") {
            const bounds = touchpad.getBoundingClientRect();
            run("tap_at", JSON.stringify({
                x: (event.clientX - bounds.left) / bounds.width,
                y: (event.clientY - bounds.top) / bounds.height
            }));
            return;
        }
        const duration = Date.now() - pressStartedAt;
        if (duration > 550) {
            run("long_press");
            return;
        }
        const now = Date.now();
        if (now - lastTapAt < 320) {
            lastTapAt = 0;
            run("double_tap");
        } else {
            lastTapAt = now;
            setTimeout(() => {
                if (lastTapAt === now) {
                    lastTapAt = 0;
                    run("tap");
                }
            }, 330);
        }
    }
    touchpad.addEventListener("pointerup", finishPointer);
    touchpad.addEventListener("pointercancel", event => {
        pointers.delete(event.pointerId);
        if (!pointers.size) touchpad.classList.remove("active");
    });

    setConnection("connecting", "Connecting");
    if (!topic || !secret || !crypto.subtle) {
        setConnection("error", "Invalid link");
        feedback("Open this controller from the kiosk QR code using HTTPS.", "error");
    } else {
        openStatusStream();
        setInterval(() => {
            if (connected) run("page_status", "", { quiet: true }).catch(() => {});
            if (lastStatusAt && Date.now() - lastStatusAt > 45000) {
                setConnection("error", "Reconnecting");
            }
        }, 20000);
    }
</script>
</body>
</html>
